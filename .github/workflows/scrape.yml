name: RiskBird 企业信息采集

on:
  workflow_dispatch:
    inputs:
      limit:
        description: '采集数量限制（默认50）'
        required: false
        default: '50'
  push:
    branches: [ main ]
  schedule:
    - cron: '0 1 * * *'  # 每天凌晨1点自动运行

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6小时超时
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: 安装系统依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          wget \
          unzip \
          libnss3 \
          libnspr4 \
          libatk1.0-0 \
          libatk-bridge2.0-0 \
          libcups2 \
          libdrm2 \
          libdbus-1-3 \
          libxkbcommon0 \
          libxcomposite1 \
          libxdamage1 \
          libxfixes3 \
          libxrandr2 \
          libgbm1 \
          libxshmfence1 \
          libasound2 \
          libpangocairo-1.0-0 \
          libpango-1.0-0 \
          libcairo2 \
          libatspi2.0-0 \
          libx11-xcb1 \
          libxrender1 \
          libxtst6 \
          libxext6
    
    - name: 安装 Python 依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        python -m playwright install chromium
        python -m playwright install-deps chromium
    
    - name: 运行采集任务
      env:
        RISKBIRD_COOKIE: ${{ secrets.RISKBIRD_COOKIE }}
      run: |
        echo "$RISKBIRD_COOKIE" > cookie.json
        python scraper_core.py --limit ${{ github.event.inputs.limit || 50 }}
      timeout-minutes: 300
    
    - name: 上传采集结果
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: 采集结果
        path: results/
        retention-days: 30
    
    - name: 提交进度文件
      if: always()
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add results/ progress.json || true
        git commit -m "自动更新采集结果 [skip ci]" || true
        git push || true
