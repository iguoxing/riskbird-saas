<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RiskBird 企业信息采集 SAAS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .quota-box {
            background: #f0f4ff;
            border: 1px solid #d0d9ff;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: #333;
        }
        .quota-num { font-weight: bold; color: #667eea; font-size: 18px; }
        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .upload-area:hover, .upload-area.dragover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        .upload-icon { font-size: 48px; margin-bottom: 12px; }
        .upload-text { color: #666; margin-bottom: 8px; }
        .upload-hint { color: #999; font-size: 12px; }
        #file-input { display: none; }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 12px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102,126,234,0.4); }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        .btn-success { background: #52c41a; color: white; }
        .btn-success:hover { background: #73d13d; }
        .progress-box {
            display: none;
            margin-top: 20px;
        }
        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
            color: #333;
        }
        .progress-bar {
            height: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
        }
        .status-text {
            text-align: center;
            margin-top: 12px;
            font-size: 14px;
            color: #666;
        }
        .qr-box {
            display: none;
            text-align: center;
            padding: 20px;
            background: #fff8e1;
            border-radius: 12px;
            margin-top: 20px;
        }
        .qr-box img {
            max-width: 200px;
            margin: 12px auto;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .result-box {
            display: none;
            text-align: center;
            padding: 20px;
            background: #f6ffed;
            border-radius: 12px;
            margin-top: 20px;
        }
        .error-box {
            display: none;
            text-align: center;
            padding: 16px;
            background: #fff2f0;
            border-radius: 8px;
            margin-top: 20px;
            color: #ff4d4f;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦅 RiskBird 企业信息采集</h1>
        <p class="subtitle">批量采集企业联系方式与注册资本</p>

        <div class="quota-box">
            <span>今日剩余查询额度</span>
            <span class="quota-num" id="quota-remaining">--</span>
        </div>

        <div class="upload-area" id="upload-area">
            <div class="upload-icon">📂</div>
            <div class="upload-text">点击或拖拽上传 Excel 文件</div>
            <div class="upload-hint">支持 .xlsx / .xls 格式</div>
        </div>
        <input type="file" id="file-input" accept=".xlsx,.xls">

        <button class="btn btn-primary" id="start-btn" disabled>上传文件后开始</button>

        <div class="progress-box" id="progress-box">
            <div class="progress-header">
                <span id="progress-text">准备中...</span>
                <span id="progress-percent">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="status-text" id="status-text"></div>
        </div>

        <div class="qr-box" id="qr-box">
            <strong>⚠️ 需要登录 RiskBird</strong>
            <p>请使用 RiskBird App 扫描下方二维码登录</p>
            <img id="qr-img" src="" alt="登录二维码">
            <p style="font-size:12px;color:#999;">登录后将自动继续采集...</p>
        </div>

        <div class="result-box" id="result-box">
            <strong>✅ 采集完成！</strong>
            <p id="result-msg"></p>
            <button class="btn btn-success" id="download-btn">下载结果 Excel</button>
        </div>

        <div class="error-box" id="error-box"></div>
    </div>

    <script>
        let currentTaskId = null;
        let pollTimer = null;

        // 查询额度
        async function loadQuota() {
            const resp = await fetch('/api/quota');
            const data = await resp.json();
            document.getElementById('quota-remaining').textContent = data.remaining;
        }
        loadQuota();

        // 上传区域交互
        const uploadArea = document.getElementById('upload-area');
        const fileInput = document.getElementById('file-input');
        const startBtn = document.getElementById('start-btn');

        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
        uploadArea.addEventListener('drop', e => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                onFileSelected();
            }
        });
        fileInput.addEventListener('change', onFileSelected);

        function onFileSelected() {
            if (fileInput.files.length) {
                uploadArea.querySelector('.upload-text').textContent = `已选择: ${fileInput.files[0].name}`;
                startBtn.disabled = false;
                startBtn.textContent = '🚀 开始采集';
            }
        }

        // 开始采集
        startBtn.addEventListener('click', async () => {
            if (!fileInput.files.length) return;
            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('file', file);

            startBtn.disabled = true;
            startBtn.textContent = '上传中...';

            try {
                const resp = await fetch('/api/upload', { method: 'POST', body: formData });
                const data = await resp.json();
                if (!resp.ok) throw new Error(data.detail || '上传失败');
                currentTaskId = data.task_id;
                document.getElementById('progress-box').style.display = 'block';
                document.getElementById('error-box').style.display = 'none';
                startBtn.textContent = '采集中...';

                // 启动任务
                await fetch(`/api/task/${currentTaskId}/start`, { method: 'POST' });
                // 开始轮询
                pollStatus();
            } catch (e) {
                showError(e.message);
                startBtn.disabled = false;
                startBtn.textContent = '🚀 开始采集';
            }
        });

        // 轮询任务状态
        function pollStatus() {
            if (!currentTaskId) return;
            if (pollTimer) clearTimeout(pollTimer);
            fetch(`/api/task/${currentTaskId}`)
                .then(r => r.json())
                .then(data => {
                    updateProgress(data);
                    if (data.status === 'running' || data.status === 'waiting_login') {
                        pollTimer = setTimeout(pollStatus, 2000);
                    } else if (data.status === 'done') {
                        onTaskDone(data);
                    } else if (data.status === 'error') {
                        showError(data.message);
                        startBtn.disabled = false;
                        startBtn.textContent = '🚀 开始采集';
                    }
                })
                .catch(() => { pollTimer = setTimeout(pollStatus, 3000); });
        }

        function updateProgress(data) {
            const pct = data.total > 0 ? Math.round(data.processed / data.total * 100) : 0;
            document.getElementById('progress-fill').style.width = pct + '%';
            document.getElementById('progress-percent').textContent = pct + '%';
            document.getElementById('progress-text').textContent = `已完成 ${data.processed} / ${data.total}`;
            document.getElementById('status-text').textContent = data.message || '';

            // 二维码
            if (data.status === 'waiting_login' && data.qr_code) {
                document.getElementById('qr-box').style.display = 'block';
                document.getElementById('qr-img').src = '/api/task/' + currentTaskId + '/qr?t=' + Date.now();
            } else {
                document.getElementById('qr-box').style.display = 'none';
            }
        }

        function onTaskDone(data) {
            document.getElementById('progress-box').style.display = 'none';
            document.getElementById('result-box').style.display = 'block';
            document.getElementById('result-msg').textContent = data.message;
            document.getElementById('download-btn').onclick = () => {
                window.location = `/api/task/${currentTaskId}/download`;
            };
            startBtn.disabled = false;
            startBtn.textContent = '🚀 开始采集';
            loadQuota();
        }

        function showError(msg) {
            const box = document.getElementById('error-box');
            box.style.display = 'block';
            box.textContent = '❌ ' + msg;
        }
    </script>
</body>
</html>
