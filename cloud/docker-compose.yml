version: "3.8"

services:
  app:
    build:
      context: ..
      dockerfile: cloud/Dockerfile
    container_name: riskbird-app
    restart: unless-stopped
    volumes:
      - riskbird_data:/app/data
    environment:
      - COOKIE_FILE=/app/data/cookies/cookie.json
    networks:
      - riskbird-net

  nginx:
    image: nginx:alpine
    container_name: riskbird-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/usr/share/nginx/html/static:ro
      - riskbird_certs:/etc/nginx/certs:ro
    depends_on:
      - app
    networks:
      - riskbird-net

volumes:
  riskbird_data:
  riskbird_certs:

networks:
  riskbird-net:
    driver: bridge
